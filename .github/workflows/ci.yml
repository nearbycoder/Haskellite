name: ci

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-2025]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libbz2-dev libx11-dev libxtst-dev pkg-config g++

      - name: Install macOS native dependencies
        if: runner.os == 'macOS'
        run: brew install sdl2 bzip2 pkg-config

      - name: Install Windows native dependencies
        if: runner.os == 'Windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-SDL2
            mingw-w64-clang-x86_64-bzip2
            mingw-w64-clang-x86_64-pkgconf

      - name: Export Windows native paths
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $clangBin = Join-Path $env:MSYS2_LOCATION "clang64\bin"
          $pkgConfigPath = Join-Path $env:MSYS2_LOCATION "clang64\lib\pkgconfig"
          $sdlPkgConfig = Join-Path $pkgConfigPath "sdl2.pc"
          $sdlMetadata = Get-Content -Path $sdlPkgConfig -Raw
          $sdlMetadata = $sdlMetadata -replace '(?m)^Libs:.*$', 'Libs: -L${libdir} -lSDL2'
          Set-Content -Path $sdlPkgConfig -Value $sdlMetadata -NoNewline
          & (Join-Path $clangBin "pkg-config.exe") --version
          $sdlLibs = & (Join-Path $clangBin "pkg-config.exe") --libs sdl2
          $sdlLibs
          if ($sdlLibs -match 'SDL2main') { throw "SDL2main must not be linked by Haskellite" }
          $clangBin | Out-File -FilePath $env:GITHUB_PATH -Append
          "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: 9.10.3
          cabal-version: 3.16.1.0

      - name: Configure
        run: cabal update

      - name: Build
        run: cabal build all --enable-tests

      - name: Test
        run: cabal test --test-show-details=direct

      - name: Headless diagnostics
        run: cabal run haskellite -- diagnostics
