name: ci

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libbz2-dev libx11-dev libxtst-dev pkg-config g++

      - name: Install macOS native dependencies
        if: runner.os == 'macOS'
        run: brew install sdl2 bzip2 pkg-config

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: 9.10.3
          cabal-version: 3.16.1.0

      - name: Configure
        run: cabal update

      - name: Build
        run: cabal build all --enable-tests

      - name: Test
        run: cabal test --test-show-details=direct

      - name: Headless diagnostics
        run: cabal run haskellite -- diagnostics
